<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KillIntruder | Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="../static/css/auth.css" />
    <script src="../static/js/login.js"></script>
  </head>
  <body>
    <!-- Animated Background Elements -->
    <div class="cyber-grid"></div>
    <div class="floating-particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="radar-scan"></div>

    <!-- Login Container -->
    <div class="container">
      <div class="card">
        <h1>Kill<span>Intruder</span></h1>

        <form onsubmit="login(event)">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
          </div>

          <!-- Error -->
          <p id="loginError" style="color: red; margin-top: 5px"></p>

          <!-- Remember + Forgot -->
          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <span class="forgot-link" onclick="resetPassword()"
              >Forgot Password?</span
            >
          </div>

          <!-- Login Button -->
          <button type="submit" class="login-btn">Login</button>

        
          <div class="signup-link">
            Don't have an account?
            <a href="signup.html" style="cursor: pointer">Sign Up</a>
          </div>
        </form>

        <div class="security-badge">
          <i class="fas fa-shield-alt"></i>
          <span>AI Based Hybrid Security</span>
        </div>
      </div>
    </div>
    <!-- Forgot Password Modal -->
    <input type="email" id="resetEmail" placeholder="Enter your email" />
    <button onclick="resetPassword()">Reset Password</button>
    <small class="error" id="resetMsg"></small>
  </body>
</html>
